<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Run Guide · Central Parkway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3f0;
  --surface: #ffffff;
  --surface2: #faf9f7;
  --border: #e8e5e0;
  --border2: #d5d0c8;
  --text: #1a1714;
  --text2: #6b6560;
  --text3: #9e9893;
  --accent: #1a56db;
  --accent-bg: #eef3ff;
  --accent2: #7c3aed;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --amber: #d97706;
  --amber-bg: #fffbeb;
  --header: #111827;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

#hdr {
  background: linear-gradient(135deg, #1a2236 0%, #111827 55%, #0c1322 100%);
  color: #fff;
  padding: 15px 18px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 1px 12px rgba(0,0,0,0.25);
}
#hdr .left { display:flex; align-items:center; gap:12px; min-width:0; }
#back-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: #fff; border-radius: var(--radius-sm);
  padding: 8px 12px; cursor: pointer; font-size: 14px; font-family: var(--font); font-weight:600;
  transition: all 0.15s; flex-shrink:0;
  display:flex; align-items:center; gap:6px; text-decoration:none;
}
#back-btn:hover { background: rgba(255,255,255,0.16); }
#hdr h1 {
  font-family: var(--mono);
  font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
  white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
}
#hdr .sub { font-size: 11px; color: #9aa3b2; }

#wrap { max-width: 900px; margin: 0 auto; padding: 16px; padding-bottom: 60px; }

#not-found {
  display:none;
  background: var(--surface); border:1.5px solid var(--border); border-radius: var(--radius);
  padding: 40px 20px; text-align:center; color: var(--text2);
}
#not-found .big { font-size: 40px; margin-bottom: 10px; }

#guide-card {
  background: var(--surface); border:1.5px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); overflow:hidden;
}
.gc-top {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
}
.gc-title { font-family: var(--mono); font-weight:700; font-size: 15px; color: var(--accent); }
.gc-badge {
  font-family: var(--mono); font-size: 11px; font-weight:700;
  background: var(--accent-bg); color: var(--accent);
  padding: 4px 10px; border-radius: 999px; letter-spacing:0.3px;
}
.gc-pre {
  font-family: var(--mono); font-size: 11.5px; line-height:1.55;
  white-space: pre; overflow-x: auto; padding: 16px 18px;
  background: var(--surface2); color: var(--text);
}
@media (max-width: 640px){
  .gc-pre{ font-size: 10px; }
}
.gc-hint {
  padding: 10px 18px 16px; font-size: 12px; color: var(--text3);
}
</style>
</head>
<body>

<div id="hdr">
  <div class="left">
    <a href="#" id="back-btn" onclick="goBack()">&#8592; Back</a>
    <div>
      <h1 id="hdr-title">Run Guide</h1>
      <div class="sub" id="hdr-sub">Weekday duty block report</div>
    </div>
  </div>
</div>

<div id="wrap">
  <div id="not-found">
    <div class="big">🚌</div>
    <div style="font-weight:700; font-size:16px; margin-bottom:6px;">No run guide found</div>
    <div id="nf-text">We couldn't find a duty block report for this crew number.</div>
  </div>

  <div id="guide-card" style="display:none">
    <div class="gc-top">
      <div class="gc-title" id="gc-crew"></div>
      <span class="gc-badge">Weekday Duty Block Report</span>
    </div>
    <div class="gc-pre" id="gc-pre"></div>
    <div class="gc-hint">Effective 2026/08/03 · Source: CP 5-Week Aug 03 2026 Weekday Run Guides</div>
  </div>
</div>

<script src="guides-data.js"></script>
<script>
function getParam(name){
  var m = new RegExp('[?&]'+name+'=([^&]*)').exec(window.location.search);
  return m ? decodeURIComponent(m[1].replace(/\+/g,' ')) : null;
}
function goBack(){
  if(window.history.length > 1){ window.history.back(); }
  else { window.close(); }
}
(function(){
  var crew = getParam('crew');
  var title = document.getElementById('hdr-title');
  var sub = document.getElementById('hdr-sub');
  var card = document.getElementById('guide-card');
  var nf = document.getElementById('not-found');

  if(!crew){
    title.textContent = 'Run Guide';
    sub.textContent = 'No crew specified';
    document.getElementById('nf-text').textContent = 'No crew number was provided in the link.';
    nf.style.display = 'block';
    return;
  }

  title.textContent = 'Crew ' + crew;
  sub.textContent = 'Weekday duty block report';

  var guide = (typeof RUN_GUIDES !== 'undefined') ? RUN_GUIDES[crew] : null;
  if(!guide){
    document.getElementById('nf-text').textContent = 'No duty block report was found for crew ' + crew + '.';
    nf.style.display = 'block';
    return;
  }

  document.getElementById('gc-crew').textContent = 'Crew ' + crew;
  document.getElementById('gc-pre').textContent = guide;
  card.style.display = 'block';
})();
</script>
</body>
</html>
